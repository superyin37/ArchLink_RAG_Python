version: "3.8"

services:
  app:
    build: .
    ports:
      - "4001:4001"
    environment:
      - APP_PORT=4001
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=ragpassword
      - MYSQL_DB=rag_system
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MEILISEARCH_ENABLED=true
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_API_KEY=masterKey
      - OPENAI_KEY=${OPENAI_KEY:-}
      - ANTHROPIC_KEY=${ANTHROPIC_KEY:-}
      - DEEPSEEK_KEY=${DEEPSEEK_KEY:-}
      - DOUBAO_HOST=${DOUBAO_HOST:-}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - DOUBAO_EMBEDDING_MODEL=${DOUBAO_EMBEDDING_MODEL:-}
      - DOUBAO_EMBEDDING_BATCH_SIZE=${DOUBAO_EMBEDDING_BATCH_SIZE:-16}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_EMBEDDING_MODEL=${QWEN_EMBEDDING_MODEL:-text-embedding-v4}
      - DEFAULT_MODEL_ID=${DEFAULT_MODEL_ID:-}
      - JWT_SECRET=${JWT_SECRET:-default-secret-change-me}
    volumes:
      - ./uploads:/app/uploads
      - ./database:/app/database
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ragpassword
      MYSQL_DATABASE: rag_system
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7701:7700"
    environment:
      - MEILI_MASTER_KEY=masterKey
      - MEILI_ENV=development
    volumes:
      - meilisearch_data:/meili_data

volumes:
  mysql_data:
  redis_data:
  meilisearch_data:
